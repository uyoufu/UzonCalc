<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts 3D 测试 - 新方法</title>
    <script src="https://echarts.apache.org/zh/js/vendors/echarts/dist/echarts.min.js"></script>
    <script src="https://echarts.apache.org/zh/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .chart-container { margin: 20px 0; }
        .info { background-color: #e0f0ff; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>ECharts 3D 图表测试</h1>
    <div class="info">
        <strong>说明：</strong>这是修复后的版本，使用唯一 ID 和 getElementById 来初始化图表
    </div>

    <h2>2D 堆积面积图</h2>
    <div class="chart-container">
        <div id="echarts_2d" style="width: 100%; height: 400px;"></div>
        <script>
            (function() {
              var container = document.getElementById('echarts_2d');
              if (container && window.echarts) {
                var chart = echarts.init(container);
                chart.setOption({"title": {"text": "Stacked Area Chart"}, "tooltip": {"trigger": "axis", "axisPointer": {"type": "cross", "label": {"backgroundColor": "#6a7985"}}}, "legend": {"data": ["Email", "Union Ads", "Video Ads", "Direct", "Search Engine"]}, "toolbox": {"feature": {"saveAsImage": {}}}, "xAxis": [{"type": "category", "boundaryGap": false, "data": ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]}], "yAxis": [{"type": "value"}], "series": [{"name": "Email", "type": "line", "stack": "Total", "areaStyle": {}, "emphasis": {"focus": "series"}, "data": [120, 132, 101, 134, 90, 230, 210]}, {"name": "Union Ads", "type": "line", "stack": "Total", "areaStyle": {}, "emphasis": {"focus": "series"}, "data": [220, 182, 191, 234, 290, 330, 310]}, {"name": "Video Ads", "type": "line", "stack": "Total", "areaStyle": {}, "emphasis": {"focus": "series"}, "data": [150, 232, 201, 154, 190, 330, 410]}, {"name": "Direct", "type": "line", "stack": "Total", "areaStyle": {}, "emphasis": {"focus": "series"}, "data": [320, 332, 301, 334, 390, 330, 320]}, {"name": "Search Engine", "type": "line", "stack": "Total", "label": {"show": true, "position": "top"}, "areaStyle": {}, "emphasis": {"focus": "series"}, "data": [820, 932, 901, 934, 1290, 1330, 1320]}]});
                console.log('2D Chart initialized');
              } else {
                console.error('ECharts not loaded or container not found');
              }
            })();
        </script>
    </div>

    <h2>3D 表面图（需要 echarts-gl）</h2>
    <div class="chart-container">
        <div id="echarts_3d" style="width: 100%; height: 600px;"></div>
        <script>
            (function() {
              var container = document.getElementById('echarts_3d');
              if (container && window.echarts) {
                var chart = echarts.init(container);
                chart.setOption({"tooltip": {}, "backgroundColor": "#fff", "visualMap": {"show": false, "dimension": 2, "min": -1, "max": 1, "inRange": {"color": ["#313695", "#4575b4", "#74add1", "#abd9e9", "#e0f3f8", "#ffffbf", "#fee090", "#fdae61", "#f46d43", "#d73027", "#a50026"]}}, "xAxis3D": {"type": "value"}, "yAxis3D": {"type": "value"}, "zAxis3D": {"type": "value"}, "grid3D": {"viewControl": {}}, "series": [{"type": "surface", "wireframe": {}, "equation": {"x": {"step": 0.05}, "y": {"step": 0.05}}}]});
                console.log('3D Chart initialized');
              } else {
                console.error('ECharts not loaded or container not found');
              }
            })();
        </script>
    </div>

    <div class="info">
        <strong>调试信息：</strong>打开浏览器控制台（F12）查看是否有错误信息。如果图表成功加载，应该看到 "initializing" 的日志。
    </div>

</body>
</html>
