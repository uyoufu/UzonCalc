<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE_TITLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">

    CUSTOM_HEADS

    <style>
        CUSTOM_STYLES
    </style>
    <style>
        :root {
            --uz-font-body-option: BODY_FONT_FAMILY;
        }

        /*正文内容：显示与打印分开*/
        .content {
            width: calc(PAGE_WIDTH + 4rem);
            padding: 0 2rem;
        }

        @media print {
            .content {
                width: PAGE_WIDTH;
                padding: 0;
            }
        }

        /* 页面尺寸设置 */
        @page {
            size: PAGE_SIZE;
            margin: PAGE_MARGIN;
        }

        /* 页眉页脚设置 */
        @page {
            @top-left {
                content: "PAGE_TITLE";
                font-size: 10pt;
                font-family: var(--uz-font-page);
            }

            @bottom-center {
                content: "—— " counter(page) " ——";
                font-size: 10pt;
                font-family: var(--uz-font-page);
            }
        }
    </style>
    <script>
        tailwind.config = {
            corePlugins: {
                preflight: false,
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <button type="button" class="uz-print-button" aria-label="打印文档">
        🖨️
    </button>
    <div class="content" page-margin="PAGE_MARGIN" page-size="PAGE_SIZE">
        <!--CONTENT_START_MARK-->
        CALC_CONTENT
        <!--CONTENT_END_MARK-->
    </div>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
    <!--template.js 从 ./js 模块中编译-->
    <script defer src="https://calc.uzoncloud.com/scripts/template.js"></script>
</body>

</html>
