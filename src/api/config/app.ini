[app]
# 若是多个值，使用逗号分隔
# 调用 iEPC 相关设置
name = uzoncalc-api
welcome = Welcome to uzoncalc-api
version = 1.4.0
host = 0.0.0.0
port = 3345
allow_origins = *,http://localhost:3345,http://localhost:3346
token_secret = D382266FB64FC3546AA2FE346AB54B475062FF9B7B3A38D4519100AAACBA3FBA

[user]
# 默认用户设置
default_userId = uzoncalc
default_password = uzoncalc123
default_department_name = 默认部门
default_regular_userId = user
default_regular_password = user123

[log]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO

[sqlite]
# sqlite 配置, enable 设置为 true 则启用 sqlite 数据库
# 若同时启用 postgres，则优先使用 postgres
enabled = true
source = sqlite:///data/db/db.sqlite3

[postgres]
enabled = false
host = localhost
port = 5432
user = uzoncalc
password = 
database = uzoncalc

[sandbox]
# 沙箱执行模式: in_process、bubblewrap 或 docker
# 安全目录白名单 (local 模式，逗号分隔)
# 会话超时时间 (秒)
# 远程 sandbox 服务地址 (仅在 mode=remote 时使用)
# 远程调用超时时间（秒）
mode = in_process
safe_dirs = 
session_timeout = 360
remote_url = http://localhost:8001
remote_timeout = 300
remote_token = change-me
bubblewrap_path = /usr/bin/bwrap
runtime_image = uzoncalc-sandbox:latest
runtime_image_digest =
memory_limit = 1073741824
cpu_limit = 2.0
pids_limit = 64
network_enabled = false

[calc_report_storage]
reports_root = data/calc-reports
artifacts_root = data/calc-artifacts
bundles_root = data/calc-bundles
max_file_count = 1000
max_total_size = 104857600
max_file_size = 26214400
build_wait_timeout = 120

[mcp]
# MCP 相关设置
# 使用之前，需要先安装 Qdrant 服务
enabled = false
qdrant = http://localhost:6333
# Embedding 服务地址（兼容 OpenAI /embeddings 格式，如 Ollama）
# 留空则禁用向量检索，降级为纯 BM25 模式
embed_url =
embed_model = bge-small-zh-v1.5
