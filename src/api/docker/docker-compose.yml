services:
  sandbox-runtime-image:
    build:
      context: ../../..
      dockerfile: src/api/docker/Dockerfile.sandbox
    image: uzoncalc-sandbox:latest
    command: ["true"]

  sandbox-service:
    build:
      context: ../../..
      dockerfile: src/api/docker/Dockerfile.sandbox-service
    image: uzoncalc-sandbox-service:latest
    restart: unless-stopped
    depends_on:
      sandbox-runtime-image:
        condition: service_completed_successfully
    environment:
      UZONCALC_SANDBOX_TOKEN: ${UZONCALC_SANDBOX_TOKEN:?set UZONCALC_SANDBOX_TOKEN}
      UZONCALC_SANDBOX_CACHE: ${UZONCALC_SANDBOX_CACHE:-/var/lib/uzoncalc-sandbox}
    ports:
      - "8001:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # The identical host/container path lets sibling runtime containers bind it.
      - ${UZONCALC_SANDBOX_CACHE:-/var/lib/uzoncalc-sandbox}:${UZONCALC_SANDBOX_CACHE:-/var/lib/uzoncalc-sandbox}

  # postgres:
  #   image: postgres:16-alpine
  #   restart: always
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: mydatabase
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      # http
      - "6333:6333"
      # grpc
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
